<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finley's Summer Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBF9F4;
    --bg-card: #FFFFFF;
    --ink: #2B2A26;
    --ink-soft: #6B6A63;
    --ink-faint: #A6A49A;
    --line: #E6E2D8;
    --running: #2F7A5C;
    --academic: #B5562E;
    --personal: #6B5FA8;
    --event: #B8862F;
    --blackout-bg: #EFECE4;
    --blackout-ink: #8C8a80;
    --running-bg: #EAF3EC;
    --academic-bg: #FBEEE7;
    --personal-bg: #EFEDF7;
    --event-bg: #FBF1E1;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    padding-bottom: 60px;
  }
  header {
    padding: 28px 20px 18px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin: 0 0 4px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 26px;
    margin: 0 0 14px;
    letter-spacing: -0.01em;
  }
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .nav-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-card);
    color: var(--ink);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn:disabled { opacity: 0.3; }
  .nav-btn:active:not(:disabled) { background: var(--line); }
  .week-label {
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    flex: 1;
  }
  .week-sub {
    font-size: 12px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 2px;
  }
  main {
    padding: 18px 16px 0;
  }
  .progress-bar {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--academic);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-text {
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .day-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .day-card.is-blackout {
    background: var(--blackout-bg);
    border-style: dashed;
  }
  .day-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 10px;
  }
  .day-name {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
  }
  .day-date {
    font-size: 12px;
    color: var(--ink-faint);
  }
  .day-today-flag {
    margin-left: auto;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--academic);
    font-weight: 600;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
  }
  .item-row + .item-row {
    border-top: 1px solid var(--line);
  }
  .item-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .item-label {
    font-size: 13.5px;
    flex: 1;
  }
  .item-time {
    font-size: 12px;
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .blackout-label {
    font-size: 14px;
    color: var(--blackout-ink);
    font-style: italic;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    padding: 14px 16px 24px;
    font-size: 11px;
    color: var(--ink-soft);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Summer 2026 &middot; June 17 &ndash; August 19</p>
  <h1>Finley's schedule</h1>
  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" aria-label="Previous week">&#8249;</button>
    <div>
      <div class="week-label" id="weekLabel"></div>
      <div class="week-sub" id="weekSub"></div>
    </div>
    <button class="nav-btn" id="nextBtn" aria-label="Next week">&#8250;</button>
  </div>
</header>

<main>
  <div class="progress-bar">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>
  <div id="days"></div>
</main>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:var(--running)"></span>Running</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--academic)"></span>Science / math / Spanish</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--personal)"></span>Music / reading / chess</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--event)"></span>Boater course / events</div>
</div>

    `).join('');
  }
  return `
    <div class="day-card${isBlackout ? ' is-blackout' : ''}">
      <div class="day-head">
        <span class="day-name">${day.weekday}</span>
        <span class="day-date">${fmtDate(day.date)}</span>
        ${isToday ? '<span class="day-today-flag">Today</span>' : ''}
      </div>
      ${inner}
    </div>
  `;
}

function render() {
  const startIdx = weekIndex * 7;
  const weekDays = data.slice(startIdx, startIdx + 7);
  document.getElementById('days').innerHTML = weekDays.map(dayCard).join('');

  const firstDate = fmtDate(weekDays[0].date);
  const lastDate = fmtDate(weekDays[weekDays.length-1].date);
  document.getElementById('weekLabel').textContent = `Week ${weekIndex+1} of ${totalWeeks}`;
  document.getElementById('weekSub').textContent = `${firstDate} - ${lastDate}`;

  document.getElementById('prevBtn').disabled = weekIndex === 0;
  document.getElementById('nextBtn').disabled = weekIndex === totalWeeks - 1;

  let scienceDone = 0;
  for (let i = 0; i <= startIdx + 6 && i < data.length; i++) {
    data[i].items.forEach(it => {
      if (it.type === 'science') {
        const m = it.label.match(/x(\d)/);
        scienceDone += m ? parseInt(m[1]) : 1;
      }
    });
  }
  const pct = Math.round((scienceDone / 50) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${scienceDone} of 50 science lessons`;

  window.scrollTo(0, 0);
}

document.getElementById('prevBtn').addEventListener('click', () => { if (weekIndex > 0) { weekIndex--; render(); } });
document.getElementById('nextBtn').addEventListener('click', () => { if (weekIndex < totalWeeks - 1) { weekIndex++; render(); } });

render();
</script>
</body>
</html>
